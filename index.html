<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FOXE |下一代 TikTok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        
        /* Modern Glass Login Screen */
        .login-screen { position: fixed; inset: 0; z-index: 1000; background: radial-gradient(circle at 30% 20%, #0a0a0a, #000000); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(0px); }
        .login-card { background: rgba(20,20,30,0.7); backdrop-filter: blur(25px); border-radius: 48px; padding: 48px 32px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05); animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .login-card h1 { font-size: 48px; font-weight: 900; background: linear-gradient(135deg, #fff, #ff2a5e, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; letter-spacing: -1px; }
        .login-card .sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 32px; }
        .auth-tabs { display: flex; gap: 12px; margin-bottom: 32px; background: rgba(255,255,255,0.08); border-radius: 100px; padding: 4px; }
        .auth-tab { flex: 1; padding: 12px; background: none; border: none; color: #aaa; cursor: pointer; border-radius: 100px; transition: all 0.3s; font-weight: 600; font-size: 16px; }
        .auth-tab.active { background: #ff2a5e; color: white; box-shadow: 0 4px 15px rgba(255,42,94,0.4); }
        .auth-form { display: none; animation: fadeIn 0.3s ease; }
        .auth-form.active { display: block; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 16px 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; color: white; font-size: 16px; transition: all 0.2s; outline: none; }
        .input-group input:focus { border-color: #ff2a5e; background: rgba(255,42,94,0.05); }
        .login-card button.primary { width: 100%; padding: 16px; background: linear-gradient(135deg, #ff2a5e, #ff6b6b); border: none; border-radius: 100px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: transform 0.2s; }
        .login-card button.primary:hover { transform: scale(1.02); }
        .error-msg { color: #ff6b6b; font-size: 13px; margin-top: 12px; }
        
        /* Main App - Modern UI */
        #mainApp { display: none; height: 100vh; background: #000; position: relative; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); pointer-events: none; }
        .top-bar > * { pointer-events: auto; }
        .logo { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 40px; backdrop-filter: blur(10px); }
        .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, #ff2a5e, #ff6b6b); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .logo-text { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
        .top-tabs { display: flex; gap: 12px; background: rgba(0,0,0,0.5); padding: 6px 18px; border-radius: 40px; backdrop-filter: blur(10px); }
        .top-tab { background: none; border: none; color: rgba(255,255,255,0.7); font-weight: 600; padding: 6px 14px; cursor: pointer; border-radius: 30px; font-size: 14px; transition: all 0.2s; }
        .top-tab.active { color: #ff2a5e; background: rgba(255,42,94,0.2); }
        .top-icons { display: flex; gap: 16px; background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 40px; backdrop-filter: blur(10px); }
        .top-icon { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        /* Stories Row */
        .stories-row { position: fixed; top: 70px; left: 0; right: 0; z-index: 90; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); padding: 12px 16px; display: flex; gap: 16px; overflow-x: auto; scrollbar-width: none; white-space: nowrap; }
        .stories-row::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 70px; cursor: pointer; }
        .story-ring { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #ff2a5e, #ff6b6b); display: flex; align-items: center; justify-content: center; }
        .story-ring.inner { background: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .story-ring.inner img { width: 100%; height: 100%; object-fit: cover; }
        .story-name { font-size: 11px; opacity: 0.8; max-width: 70px; overflow: hidden; text-overflow: ellipsis; }
        
        /* Videos */
        .videos-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .videos-container::-webkit-scrollbar { display: none; }
        .video-item { height: 100vh; scroll-snap-align: start; position: relative; background: #000; }
        .video-item video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .video-info { position: absolute; bottom: 100px; left: 16px; right: 80px; z-index: 20; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .author-info { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .author-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #ff2a5e, #ff6b6b); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 2px solid white; overflow: hidden; }
        .author-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .follow-btn { background: #ff2a5e; padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; color: white; }
        .video-caption { font-size: 14px; margin-bottom: 8px; line-height: 1.4; }
        .video-music { font-size: 12px; opacity: 0.9; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .hashtag { color: #ff2a5e; cursor: pointer; }
        .side-actions { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 24px; z-index: 20; }
        .side-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: white; cursor: pointer; font-size: 11px; text-shadow: 0 1px 2px black; }
        .side-btn i { font-size: 32px; }
        .side-btn.active i { color: #ff2a5e; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; padding: 12px 0 24px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 100; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 10px; transition: all 0.2s; }
        .nav-item i { font-size: 24px; }
        .nav-item.active { color: #ff2a5e; transform: translateY(-2px); }
        .create-btn { width: 52px; height: 52px; background: linear-gradient(135deg, #ff2a5e, #ff6b6b); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -28px; cursor: pointer; box-shadow: 0 0 20px rgba(255,42,94,0.5); transition: transform 0.2s; }
        .create-btn:hover { transform: scale(1.05); }
        
        /* Panels */
        .panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 300; transform: translateX(100%); transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); overflow-y: auto; }
        .panel.open { transform: translateX(0); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; background: #000; z-index: 10; }
        .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); }
        
        /* Upload */
        .upload-content { max-width: 500px; margin: 0 auto; padding: 20px; }
        .video-preview-area { background: #111; border-radius: 24px; overflow: hidden; margin-bottom: 24px; cursor: pointer; border: 2px dashed rgba(255,42,94,0.4); transition: all 0.2s; }
        .preview-placeholder { text-align: center; padding: 60px 20px; }
        .upload-form { background: #0a0a0a; border-radius: 24px; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 16px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; color: white; }
        .upload-submit-btn { background: linear-gradient(135deg, #ff2a5e, #ff6b6b); padding: 14px; border-radius: 40px; font-weight: bold; border: none; color: white; width: 100%; cursor: pointer; }
        
        /* Toast */
        .copy-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 50px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .copy-toast.show { opacity: 1; }
        .heart-animation { position: fixed; font-size: 80px; color: #ff2a5e; pointer-events: none; z-index: 1000; animation: heartFloat 0.8s ease-out forwards; }
        @keyframes heartFloat { 0% { transform: scale(0.5) translateY(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-100px); opacity: 0; } }
        .loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #888; gap: 12px; flex-direction: column; }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,42,94,0.3); border-top-color: #ff2a5e; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* RTL & responsiveness */
        textarea, input, select { font-family: inherit; }
        .profile-header { background: linear-gradient(135deg, #ff2a5e, #ff6b6b); padding: 40px 20px; text-align: center; }
        .profile-avatar-large { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
    </style>
</head>
<body>

<!-- Modern Login Screen -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>FOXE</h1>
        <div class="sub">下一代短视频平台</div>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
            <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
        </div>
        <div id="loginForm" class="auth-form active">
            <div class="input-group"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني"></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="كلمة المرور"></div>
            <button class="primary" onclick="login()">دخول</button>
            <div id="loginMsg" class="error-msg"></div>
        </div>
        <div id="registerForm" class="auth-form">
            <div class="input-group"><input type="text" id="regName" placeholder="اسم المستخدم"></div>
            <div class="input-group"><input type="email" id="regEmail" placeholder="البريد الإلكتروني"></div>
            <div class="input-group"><input type="password" id="regPass" placeholder="كلمة المرور (6+ أحرف)"></div>
            <button class="primary" onclick="register()">إنشاء حساب</button>
            <div id="regMsg" class="error-msg"></div>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="mainApp">
    <div class="top-bar">
        <div class="logo"><div class="logo-icon">F</div><span class="logo-text">FOXE</span></div>
        <div class="top-tabs">
            <button class="top-tab" onclick="switchFeed('following')">متابَعين</button>
            <button class="top-tab active" onclick="switchFeed('forYou')">لك</button>
        </div>
        <div class="top-icons">
            <i class="fas fa-search top-icon" onclick="openSearch()"></i>
            <i class="fas fa-music top-icon" onclick="openSounds()"></i>
        </div>
    </div>

    <!-- Stories Row -->
    <div id="storiesRow" class="stories-row"></div>

    <div class="videos-container" id="videosContainer"><div class="loading"><div class="spinner"></div><span>جاري التحميل...</span></div></div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home"></i><span>الرئيسية</span></button>
        <button class="nav-item" onclick="switchTab('search')"><i class="fas fa-search"></i><span>بحث</span></button>
        <div class="create-btn" onclick="openUploadPanel()"><i class="fas fa-plus"></i></div>
        <button class="nav-item" onclick="openConversations()"><i class="fas fa-envelope"></i><span>الرسائل</span></button>
        <button class="nav-item" onclick="openMyProfile()"><i class="fas fa-user"></i><span>الملف</span></button>
    </div>

    <div id="copyToast" class="copy-toast">✅ تم نسخ الرابط</div>

    <!-- Panels (Simplified for brevity, full functionality in JS) -->
    <div id="sharePanel" class="panel"><div class="panel-header"><h3>مشاركة</h3><button class="close-btn" onclick="closeShare()"><i class="fas fa-times"></i></button></div><div class="share-option p-4" onclick="copyLink()"><i class="fas fa-link"></i> نسخ الرابط</div><div class="share-option p-4" onclick="downloadVideo()"><i class="fas fa-download"></i> تنزيل</div></div>
    <div id="commentsPanel" class="panel"><div class="panel-header"><h3>التعليقات</h3><button class="close-btn" onclick="closeComments()"><i class="fas fa-times"></i></button></div><div id="commentsList" class="p-4"></div><div class="add-comment p-4 flex gap-2"><input type="text" id="commentInput" class="flex-1 bg-gray-800 rounded-full p-3" placeholder="أضف تعليقاً..."><button onclick="addComment()" class="bg-[#ff2a5e] px-4 rounded-full">نشر</button></div></div>
    <div id="searchPanel" class="panel"><div class="panel-header"><h3>بحث</h3><button class="close-btn" onclick="closeSearch()"><i class="fas fa-times"></i></button></div><div class="p-4"><input type="text" id="searchInput" class="w-full p-3 bg-gray-800 rounded-full" placeholder="بحث..." onkeyup="searchAll()"></div><div id="searchResults" class="p-4"></div></div>
    <div id="soundsPanel" class="panel"><div class="panel-header"><h3>الأصوات</h3><button class="close-btn" onclick="closeSounds()"><i class="fas fa-times"></i></button></div><div id="soundsList" class="p-2"></div></div>
    <div id="notificationsPanel" class="panel"><div class="panel-header"><h3>الإشعارات</h3><button class="close-btn" onclick="closeNotifications()"><i class="fas fa-times"></i></button></div><div id="notificationsList" class="p-4"></div></div>
    <div id="uploadPanel" class="panel"><div class="panel-header"><h3>رفع فيديو</h3><button class="close-btn" onclick="closeUploadPanel()"><i class="fas fa-times"></i></button></div><div class="upload-content"><div class="video-preview-area" onclick="document.getElementById('videoFileInput').click()"><div class="preview-placeholder"><i class="fas fa-cloud-upload-alt fa-3x"></i><p>اختر فيديو</p></div><video id="videoPreview" class="video-preview" style="display:none" controls></video></div><input type="file" id="videoFileInput" accept="video/*" style="display:none" onchange="previewVideo(this.files[0])"><div class="upload-form"><div class="form-group"><textarea id="videoDescription" placeholder="وصف الفيديو..."></textarea></div><div class="form-group"><input type="text" id="videoMusic" placeholder="اسم المقطع"></div><button class="upload-submit-btn" onclick="uploadVideo()">رفع</button><div id="uploadStatus" class="text-center mt-2"></div></div></div></div>
    <div id="profilePanel" class="panel"><div class="back-btn absolute top-5 right-5 z-20 bg-black/50 w-10 h-10 rounded-full flex items-center justify-center cursor-pointer" onclick="closeProfile()"><i class="fas fa-arrow-right"></i></div><div class="profile-header"><div class="profile-avatar-large" id="profileAvatarDisplay">👤</div><h2 id="profileNameDisplay" class="mt-4 text-2xl font-bold"></h2><p id="profileBioDisplay" class="opacity-70"></p><div class="flex gap-4 justify-center mt-4"><div class="text-center"><div id="profilePoints" class="text-xl font-bold">0</div><div class="text-xs">نقاط</div></div></div><div id="profileActions" class="mt-6 flex gap-3 justify-center flex-wrap"></div></div><div class="p-4"><h3 class="font-bold mb-3">فيديوهاتي</h3><div id="profileVideosList" class="grid grid-cols-3 gap-1"></div></div></div>
    <div id="conversationsPanel" class="panel"><div class="panel-header"><h3>المحادثات</h3><button class="close-btn" onclick="closeConversations()"><i class="fas fa-times"></i></button></div><div id="conversationsList" class="p-4"></div></div>
    <div id="privateChatPanel" class="panel"><div class="panel-header"><div class="flex items-center gap-3"><div id="chatAvatar" class="w-10 h-10 rounded-full bg-gray-700"></div><h3 id="chatUserName"></h3></div><button class="close-btn" onclick="closePrivateChat()"><i class="fas fa-times"></i></button></div><div id="privateMessagesList" class="flex-1 overflow-y-auto p-4 h-[calc(100%-120px)]"></div><div class="flex gap-2 p-4 border-t border-gray-800"><input type="text" id="privateMessageInput" class="flex-1 bg-gray-800 rounded-full p-3" placeholder="رسالة..."><button onclick="sendPrivateMessage()" class="bg-[#ff2a5e] px-4 rounded-full"><i class="fas fa-paper-plane"></i></button></div></div>
</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
